<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Registration | Eventify</title>
    <link rel="stylesheet" href="assets/css/design-system.css">
    <style>
        .check-container {
            max-width: 600px;
            margin: 10rem auto;
            padding: 0 2rem;
        }
        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 1rem;
        }
        .status-pending { background: #fff0e6; color: #FF3000; }
        .status-approved { background: #e6ffe6; color: #008000; }
        .status-rejected { background: #ffe6e6; color: #d00; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand-container">
                <a href="index.html" class="nav-brand">EVENTIFY</a>
                <span class="nav-tagline">OBJECTIVE EVENT MANAGEMENT SYSTEM</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="check-registration.html" class="nav-link active">Check Status</a>
                <a href="admin/index.html" class="nav-link">Admin</a>
            </div>
        </nav>

    <div class="check-container">
        <header style="margin-bottom: 4rem;">
            <p style="font-weight: 900; letter-spacing: 0.2em; color: var(--accent-color); margin-bottom: 0.5rem;">REGISTRATION</p>
            <h1>CHECK STATUS</h1>
        </header>

        <div class="card">
            <p style="margin-bottom: 2rem; opacity: 0.7;">Enter your email address to check the status of your event registration and download your pass if approved.</p>
            
            <form id="check-form">
                <label style="font-weight: 900; display: block; margin-bottom: 0.5rem;">EMAIL ADDRESS</label>
                <input type="email" name="email" id="email-input" placeholder="YOUR@EMAIL.COM" required style="width: 100%; margin-bottom: 1.5rem;">
                <button type="submit" class="btn btn-accent" style="width: 100%;">FIND REGISTRATION</button>
            </form>

            <div id="result-area" style="display: none; margin-top: 3rem; border-top: 4px solid black; padding-top: 2rem;">
                <div id="registrations-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { API } from './assets/js/api.js';

        const form = document.getElementById('check-form');
        const resultArea = document.getElementById('result-area');
        const list = document.getElementById('registrations-list');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            
            try {
                // We need a specific endpoint to find registrations by email
                const data = await API.get('participants/status', { email });
                
                resultArea.style.display = 'block';
                list.innerHTML = '';

                if (data.length === 0) {
                    list.innerHTML = '<p style="opacity: 0.5;">No registrations found for this email.</p>';
                } else {
                    data.forEach(reg => {
                        const item = document.createElement('div');
                        item.style.marginBottom = '2rem';
                        item.style.padding = '1.5rem';
                        item.style.background = '#f9f9f9';
                        item.style.borderLeft = `8px solid ${reg.status === 'approved' ? '#008000' : (reg.status === 'pending' ? 'var(--accent-color)' : '#000')}`;
                        
                        item.innerHTML = `
                            <h3 style="margin-bottom: 0.5rem;">${reg.event_title}</h3>
                            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 1rem;">Registered on: ${new Date(reg.registered_at).toLocaleDateString()}</p>
                            <div class="status-badge status-${reg.status}">${reg.status}</div>
                            ${reg.status === 'approved' ? `
                                <div style="margin-top: 1.5rem;">
                                    <a href="pass.html?id=${reg.id}" class="btn btn-accent" style="font-size: 0.8rem; padding: 0.5rem 1rem;">VIEW & DOWNLOAD PASS</a>
                                </div>
                            ` : ''}
                        `;
                        list.appendChild(item);
                    });
                }
            } catch (err) {
                alert('Error looking up registration: ' + err.message);
            }
        };
    </script>
        </div>
    </div>
</body>
</html>
