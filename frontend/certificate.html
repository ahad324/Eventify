<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate | Eventify</title>
    <link rel="stylesheet" href="assets/css/design-system.css">
    <style>
        body { background: white; margin: 0; padding: 0; }
        .cert-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5rem;
            box-sizing: border-box;
            border: 20px solid black;
            position: relative;
        }
        .cert-header { font-size: 10rem; line-height: 0.8; font-weight: 900; letter-spacing: -0.05em; }
        .cert-body { margin-top: auto; }
        .cert-name { font-size: 5rem; font-weight: 900; color: #FF3000; text-transform: uppercase; }
        .cert-event { font-size: 2rem; font-weight: 700; margin-top: 1rem; }
        .cert-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 4rem; }
        @media print {
            .no-print { display: none; }
            .cert-container { border: 10px solid black; }
        }
    </style>
</head>
<body>
    <button onclick="window.print()" class="btn btn-accent no-print" style="position: fixed; top: 2rem; right: 2rem;">DOWNLOAD PDF</button>

    <div class="cert-container">
        <div class="cert-header">
            CERTIFIED<br>EXCELLENCE
        </div>
        
        <div class="cert-body">
            <div id="participant-name" class="cert-name">LOADING...</div>
            <div id="event-title" class="cert-event">Loading event...</div>
        </div>

        <div class="cert-footer">
            <div>
                <p style="font-weight: 900;">EVENTIFY / 2026</p>
                <p>UNIVERSITY AUTHORIZED</p>
            </div>
            <div style="text-align: right;">
                <p style="font-weight: 900;">OFFICIAL RECORD</p>
                <p id="cert-id"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { API } from './assets/js/api.js';

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function init() {
            try {
                const data = await API.get(`certificate?id=${id}`);
                document.getElementById('participant-name').textContent = data.name;
                document.getElementById('event-title').textContent = data.event_title;
                document.getElementById('cert-id').textContent = id.substring(0, 8).toUpperCase();
            } catch (err) {
                document.body.innerHTML = '<h1>UNAUTHORIZED OR NOT FOUND</h1>';
            }
        }

        init();
    </script>
</body>
</html>
