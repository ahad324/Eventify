<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify | Swiss Modern</title>
    <link rel="stylesheet" href="assets/css/design-system.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand-container">
                <a href="index.html" class="nav-brand">EVENTIFY</a>
                <span class="nav-tagline">ELEVATING EVERY EXPERIENCE</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="check-status.html" class="nav-link">Check Status</a>
                <a href="admin/index.html" class="nav-link">Admin</a>
            </div>
        </nav>

        <header>
            <h1>CAMPUS<br>CONNECTIONS</h1>
            <p style="font-weight: 700; margin-bottom: 4rem; opacity: 0.8; letter-spacing: 0.1em;">PREMIUM UNIVERSITY EVENT MANAGEMENT</p>
        </header>

        <main class="grid" id="events-grid">
            <h2 class="section-title">UPCOMING EVENTS</h2>
            <!-- Events will be injected here -->
        </main>

        <div id="gallery-modal" class="modal">
            <div class="modal-content">
                <span class="modal-close" onclick="closeGallery()">&times;</span>
                <h2 id="gallery-title">EVENT GALLERY</h2>
                <div id="gallery-container" class="gallery-grid"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { API } from './assets/js/api.js';

        window.openGallery = async (eventId, title) => {
            const modal = document.getElementById('gallery-modal');
            const container = document.getElementById('gallery-container');
            const titleElem = document.getElementById('gallery-title');
            
            titleElem.textContent = `${title} GALLERY`;
            container.innerHTML = '';
            modal.classList.add('active');

            try {
                const photos = await API.get(`events/gallery?event_id=${eventId}`);
                if (photos.length === 0) {
                    container.innerHTML = '<p>No photos uploaded yet.</p>';
                } else {
                    photos.forEach(photo => {
                        const div = document.createElement('div');
                        div.className = 'gallery-item';
                        div.innerHTML = `<img src="${API.ROOT_URL}/${photo.image_url}" alt="Gallery Photo">`;
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('Failed to load gallery:', error);
            }
        };

        window.closeGallery = () => {
            document.getElementById('gallery-modal').classList.remove('active');
        };

        async function init() {
            const grid = document.getElementById('events-grid');
            try {
                const events = await API.get('events');
                events.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const bannerImg = event.banner_url ? 
                        `<img src="${API.ROOT_URL}/${event.banner_url}" class="card-banner" alt="${event.title}">` : 
                        '<div class="card-banner" style="background: #eee; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #ccc;">NO IMAGE</div>';

                    card.innerHTML = `
                        ${bannerImg}
                        <h3>${event.title}</h3>
                        <p style="margin: 1rem 0;">${new Date(event.event_date).toLocaleDateString()}</p>
                        <p style="font-size: 0.9rem; margin-bottom: 2rem;">${event.location}</p>
                        <div style="display: flex; gap: 1rem;">
                            <a href="register.html?id=${event.id}" class="btn" style="flex: 1; text-align: center;">Register</a>
                            <button onclick="openGallery('${event.id}', '${event.title.replace(/'/g, "\\'")}')" class="btn btn-accent" style="flex: 1;">Gallery</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error(error);
            }
        }

        init();
    </script>
</body>
</html>
