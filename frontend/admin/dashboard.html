<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Eventify</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="nav-brand-container">
                <a href="dashboard.html" class="nav-brand">EVENTIFY</a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link active">Dashboard</a>
                <a href="events.html" class="sidebar-link">Events</a>
                <a href="participants.html" class="sidebar-link">Participants</a>
                <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                    <a href="#" id="logout-btn" class="sidebar-link" style="color: var(--accent-color)">Logout</a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 4rem;">
                <p style="font-weight: 900; letter-spacing: 0.2em; color: var(--accent-color); margin-bottom: 0.5rem;">OVERVIEW</p>
                <h1>DASHBOARD</h1>
            </header>

            <div class="grid">
                <!-- Stats Cards -->
                <div class="card" style="grid-column: span 3; border-left: 12px solid black;">
                    <p style="font-weight: 900; opacity: 0.6; font-size: 0.8rem; letter-spacing: 0.1em;">ACTIVE EVENTS</p>
                    <h2 id="stat-events" style="font-size: 3rem; margin-top: 0.5rem;">0</h2>
                </div>

                <div class="card" style="grid-column: span 3; border-left: 12px solid var(--accent-color);">
                    <p style="font-weight: 900; color: var(--accent-color); font-size: 0.8rem; letter-spacing: 0.1em;">PENDING</p>
                    <h2 id="stat-pending" style="font-size: 3rem; margin-top: 0.5rem; color: var(--accent-color);">0</h2>
                </div>

                <div class="card" style="grid-column: span 3; border-left: 12px solid var(--secondary-color);">
                    <p style="font-weight: 900; color: var(--secondary-color); font-size: 0.8rem; letter-spacing: 0.1em;">PARTICIPANTS</p>
                    <h2 id="stat-participants" style="font-size: 3rem; margin-top: 0.5rem; color: var(--secondary-color);">0</h2>
                </div>

                <div class="card" style="grid-column: span 3; border-left: 12px solid #00D1FF;">
                    <p style="font-weight: 900; color: #00D1FF; font-size: 0.8rem; letter-spacing: 0.1em;">APPROVED</p>
                    <h2 id="stat-approved" style="font-size: 3rem; margin-top: 0.5rem; color: #00D1FF;">0</h2>
                </div>

                <!-- Recent Activity Table -->
                <div class="card" style="grid-column: span 8; padding: 0;">
                    <div style="padding: 2.5rem; border-bottom: 4px solid black; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="font-size: 1.2rem; margin: 0;">RECENT REGISTRATIONS</h3>
                        <a href="participants.html" class="nav-link" style="font-size: 0.7rem; border-bottom: 2px solid var(--accent-color);">VIEW ALL</a>
                    </div>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left;">
                            <thead>
                                <tr style="background: var(--muted-color); font-size: 0.8rem; font-weight: 900;">
                                    <th style="padding: 1.5rem 2rem;">NAME</th>
                                    <th style="padding: 1.5rem 2rem;">EVENT</th>
                                    <th style="padding: 1.5rem 2rem;">STATUS</th>
                                </tr>
                            </thead>
                            <tbody id="recent-participants">
                                <tr><td colspan="3" style="padding: 2rem; text-align: center; opacity: 0.5;">Loading activity...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Quick Links -->
                <div class="card" style="grid-column: span 4; background: var(--text-color); color: white; display: flex; flex-direction: column;">
                    <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 1rem; color: white;">QUICK ACTIONS</h3>
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <a href="events.html" class="btn btn-accent" style="width: 100%; text-align: center;">CREATE EVENT</a>
                        <a href="participants.html" class="btn" style="width: 100%; text-align: center; background: white; color: black; border: 4px solid white;">MANAGE USERS</a>
                    </div>
                    <div style="margin-top: auto; padding-top: 3rem;">
                        <div style="padding: 1.5rem; background: rgba(255,255,255,0.05); border-left: 4px solid var(--secondary-color);">
                            <p style="font-weight: 900; margin-bottom: 0.5rem; color: var(--secondary-color); letter-spacing: 0.1em; font-size: 0.7rem;">SYSTEM STATUS</p>
                            <p style="opacity: 0.7; font-size: 0.8rem;">Database: Connected</p>
                            <p style="opacity: 0.7; font-size: 0.8rem;" id="server-time">Checking time...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { API } from '../assets/js/api.js';
        import { initAdminLayout } from '../assets/js/admin-common.js';

        initAdminLayout();

        async function loadStats() {
            try {
                const events = await API.get('events');
                const participants = await API.get('admin/participants');
                
                document.getElementById('stat-events').textContent = events.length;
                document.getElementById('stat-participants').textContent = participants.length;
                
                const pending = participants.filter(p => p.status === 'pending').length;
                const approved = participants.filter(p => p.status === 'approved').length;
                
                document.getElementById('stat-pending').textContent = pending;
                document.getElementById('stat-approved').textContent = approved;

                const recentTable = document.getElementById('recent-participants');
                recentTable.innerHTML = '';
                
                const recent = participants.slice(0, 5);
                if (recent.length === 0) {
                    recentTable.innerHTML = '<tr><td colspan="3" style="padding: 4rem; text-align: center;"><p style="opacity: 0.5; font-weight: 900;">NO RECENT ACTIVITY</p></td></tr>';
                }

                recent.forEach(p => {
                    const row = document.createElement('tr');
                    row.style.borderBottom = '1px solid #eee';
                    row.innerHTML = `
                        <td style="padding: 1.5rem 2rem; font-weight: 700;">${p.name}</td>
                        <td style="padding: 1.5rem 2rem; opacity: 0.7;">${p.event_title}</td>
                        <td style="padding: 1.5rem 2rem;">
                            <span style="font-weight: 900; font-size: 0.7rem; padding: 0.4rem 0.8rem; background: ${p.status === 'approved' ? '#00D1FF22' : (p.status === 'pending' ? '#FF300011' : '#eee')}; color: ${p.status === 'approved' ? 'var(--secondary-color)' : (p.status === 'pending' ? 'var(--accent-color)' : '#666')}; border: 1px solid currentColor; text-transform: uppercase;">
                                ${p.status}
                            </span>
                        </td>
                    `;
                    recentTable.appendChild(row);
                });

            } catch (err) {
                console.error(err);
                if (err.message.includes('403') || err.message.includes('Unauthorized')) {
                    window.location.href = 'index.html';
                }
            }
        }

        loadStats();
        setInterval(() => {
            document.getElementById('server-time').textContent = 'Server Time: ' + new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
