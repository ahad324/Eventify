<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participants | Eventify Admin</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="nav-brand-container">
                <a href="dashboard.html" class="nav-brand">EVENTIFY</a>
                <span class="nav-tagline" style="color: rgba(255,255,255,0.5)">ADMIN PORTAL</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">Dashboard</a>
                <a href="events.html" class="sidebar-link">Events</a>
                <a href="participants.html" class="sidebar-link active">Participants</a>
                <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                    <a href="#" id="logout-btn" class="sidebar-link" style="color: var(--accent-color)">Logout</a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 4rem;">
                <p style="font-weight: 900; letter-spacing: 0.2em; color: var(--accent-color); margin-bottom: 0.5rem;">REGISTRATIONS</p>
                <h1>PARTICIPANTS</h1>
            </header>

            <div class="grid" id="participants-list">
                <!-- Dynamic Content -->
            </div>
        </main>
    </div>

    <script type="module">
        import { API } from '../assets/js/api.js';
        import { initAdminLayout } from '../assets/js/admin-common.js';

        initAdminLayout();

        async function loadParticipants() {
            try {
                const participants = await API.get('admin/participants');
                const container = document.getElementById('participants-list');
                container.innerHTML = '';

                if (participants.length === 0) {
                    container.innerHTML = `
                        <div class="card" style="grid-column: 1 / -1; text-align: center; padding: 5rem;">
                            <h2 style="opacity: 0.2; margin-bottom: 1rem;">NO REGISTRATIONS</h2>
                            <p style="font-weight: 700; opacity: 0.5;">WAITING FOR USERS TO SIGN UP</p>
                        </div>
                    `;
                }

                participants.forEach(p => {
                    const card = document.createElement('div');
                    card.style.gridColumn = 'span 4';
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                            <p style="font-size: 0.7rem; font-weight: 900; color: var(--accent-color); letter-spacing: 0.1em;">${p.event_title}</p>
                            <span style="font-size: 0.6rem; font-weight: 900; padding: 0.3rem 0.6rem; border: 1px solid currentColor; color: ${p.status === 'approved' ? 'var(--secondary-color)' : (p.status === 'pending' ? 'var(--accent-color)' : '#999')}">${p.status.toUpperCase()}</span>
                        </div>
                        <h3 style="font-size: 1.8rem; margin-bottom: 0.5rem; line-height: 1;">${p.name}</h3>
                        <p style="font-weight: 700; color: #666; margin-bottom: 2rem; font-size: 0.9rem;">${p.email}</p>
                        
                        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: auto;">
                            ${p.status === 'pending' ? `
                                <button class="btn btn-accent btn-sm approve-btn" data-id="${p.id}" style="flex: 1;">APPROVE</button>
                                <button class="btn btn-sm reject-btn" data-id="${p.id}" style="border: 4px solid black; background: white; color: black; flex: 1;">REJECT</button>
                            ` : ''}
                            ${p.status === 'approved' ? `
                                <a href="../pass.html?id=${p.id}" target="_blank" class="btn btn-sm" style="width: 100%; text-align: center; background: var(--secondary-color); color: black;">VIEW PASS</a>
                            ` : ''}
                            ${p.status === 'rejected' ? `
                                <button class="btn btn-accent btn-sm approve-btn" data-id="${p.id}" style="width: 100%;">RECONSIDER</button>
                            ` : ''}
                        </div>
                    `;
                    container.appendChild(card);
                });

                attachListeners();
            } catch (err) {
                console.error(err);
                if (err.message.includes('403') || err.message.includes('Unauthorized')) {
                    window.location.href = 'index.html';
                }
            }
        }

        function attachListeners() {
            document.querySelectorAll('.approve-btn').forEach(btn => {
                btn.onclick = async () => {
                    try {
                        await API.post('admin/approve', { participant_id: btn.dataset.id });
                        loadParticipants();
                    } catch (err) {
                        alert('Failed to approve participant');
                    }
                };
            });
            document.querySelectorAll('.reject-btn').forEach(btn => {
                btn.onclick = async () => {
                    try {
                        await API.post('admin/reject', { participant_id: btn.dataset.id });
                        loadParticipants();
                    } catch (err) {
                        alert('Failed to reject participant');
                    }
                };
            });
        }

        document.getElementById('logout-btn').onclick = async (e) => {
            e.preventDefault();
            await API.get('admin/logout');
            window.location.href = 'index.html';
        };

        loadParticipants();
    </script>

    <style>
        .btn-sm { padding: 0.8rem 1.5rem; font-size: 0.8rem; }
        @media (max-width: 1200px) {
            .card { grid-column: span 6 !important; }
        }
        @media (max-width: 600px) {
            .card { grid-column: span 12 !important; }
        }
    </style>
</body>
</html>
